version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: capabl_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-capabl_finance}
      POSTGRES_USER: ${DB_USER:-capabl}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-capabl}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api_gateway:
    build:
      context: .
      dockerfile: backend/api_gateway/Dockerfile
    container_name: capabl_api_gateway
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_in_production}
      MARKET_DATA_SERVICE_URL: http://market_data:8001
      PORTFOLIO_SERVICE_URL: http://portfolio:8002
      ANALYTICS_SERVICE_URL: http://analytics:8003
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
    ports:
      - "8000:8000"
    depends_on:
      - market_data
      - portfolio
      - analytics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Market Data Service
  market_data:
    build:
      context: .
      dockerfile: backend/services/market_data/Dockerfile
    container_name: capabl_market_data
    environment:
      SERVICE_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Portfolio Service
  portfolio:
    build:
      context: .
      dockerfile: backend/services/portfolio/Dockerfile
    container_name: capabl_portfolio
    environment:
      SERVICE_PORT: 8002
      DATABASE_URL: postgresql://${DB_USER:-capabl}:${DB_PASSWORD:-change_me_in_production}@postgres:5432/${DB_NAME:-capabl_finance}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Analytics Service
  analytics:
    build:
      context: .
      dockerfile: backend/services/analytics/Dockerfile
    container_name: capabl_analytics
    environment:
      SERVICE_PORT: 8003
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring Service
  monitoring:
    build:
      context: .
      dockerfile: backend/monitoring/Dockerfile
    container_name: capabl_monitoring
    environment:
      SERVICE_PORT: 8004
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: capabl_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_TIMEOUT: 30000
    ports:
      - "3000:3000"
    depends_on:
      - api_gateway

volumes:
  postgres_data:

networks:
  default:
    name: capabl_network
